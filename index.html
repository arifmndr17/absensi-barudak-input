    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; overflow-x: hidden; }
        
        /* 1. ANIMASI BORDER BERJALAN GRADIENT */
        @keyframes spin-border {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .running-border { position: relative; overflow: hidden; }
        .running-border::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, #3b82f6, #a855f7, #ec4899, #3b82f6);
            animation: spin-border 4s linear infinite; z-index: 0;
        }

        /* 2. ANIMASI BACKGROUND BLOBS */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* 3. ANIMASI KASET MUSIK BERPUTAR */
        @keyframes rotate-music {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: rotate-music 4s linear infinite; }

        /* 4. ANIMASI DI LUAR KARTU (GLOBAL BACKGROUND) */
        @keyframes drift-outside {
            0% { transform: translateX(-150%) translateY(0); }
            50% { transform: translateX(50vw) translateY(-25px); }
            100% { transform: translateX(100vw) translateY(0); }
        }
        .animate-drift-outside-slow { animation: drift-outside 65s linear infinite; }
        .animate-drift-outside-sun { animation: drift-outside 50s linear infinite; }
        .animate-drift-outside-moon { animation: drift-outside 58s linear infinite; }

        /* 5. ANIMASI DI DALAM KARTU (INTERNAL FLOATING) */
        @keyframes drift-inside {
            0% { transform: translateX(-100px) rotate(0deg); }
            100% { transform: translateX(460px) rotate(360deg); }
        }
        .animate-cloud-in-slow { animation: drift-inside 35s linear infinite; }
        .animate-cloud-in-fast { animation: drift-inside 22s linear infinite; }
        .animate-sun-in { animation: drift-inside 26s linear infinite; }
        .animate-moon-in { animation: drift-inside 31s linear infinite; }

        /* 6. ANIMASI KEDIPAN BINTANG (TWINKLE) */
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.3) rotate(180deg); }
        }
        .animate-twinkle { animation: twinkle 3s ease-in-out infinite; }

        /* 7. ANIMASI AUTO SLIDE GAMBAR BERJAJAR */
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .slider-track {
            display: flex;
            gap: 12px;
            width: max-content;
            animation: marquee 20s linear infinite;
        }

        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>

    <script>
        // SCRIPT BARU: MENAHAN LOADING SCREEN SELAMA BEBERAPA DETIK
        window.addEventListener('load', () => {
            const loadingScreen = document.getElementById('loadingScreen');
            
            // Angka 2500 artinya ditahan 2,5 detik sebelum mulai memudar (fade-out)
            setTimeout(() => {
                loadingScreen.classList.add('opacity-0', 'pointer-events-none');
                
                // Menghapus elemen dari dokumen setelah animasi memudar selesai (0.7 detik)
                setTimeout(() => {
                    loadingScreen.remove();
                }, 700);
            }, 2500); // Ganti angka 2500 ini (misal: 3000 untuk 3 detik, 4000 untuk 4 detik)
        });

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const photoPreview = document.getElementById('photoPreview');
        const captureBtn = document.getElementById('captureBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const cameraStatus = document.getElementById('cameraStatus');
        const form = document.getElementById('attendanceForm');
        const submitBtn = document.getElementById('submitBtn');
        
        const bgMusic = document.getElementById('bgMusic');
        const musicToggleBtn = document.getElementById('musicToggleBtn');
        const musicIcon = document.getElementById('musicIcon');

        let imgBase64 = "";

        document.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play().catch(err => console.log("Autoplay ditangguhkan:", err));
                musicIcon.classList.add('animate-spin-slow');
            }
        }, { once: true });

        musicToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (bgMusic.paused) {
                bgMusic.play();
                musicIcon.classList.add('animate-spin-slow');
                musicIcon.classList.remove('text-slate-400');
                musicIcon.classList.add('text-indigo-600');
            } else {
                bgMusic.pause();
                musicIcon.classList.remove('animate-spin-slow');
                musicIcon.classList.remove('text-indigo-600');
                musicIcon.classList.add('text-slate-400');
            }
        });

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("Harap izinkan akses kamera pada browser Anda."); });

        captureBtn.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            const scaleFactor = 640 / video.videoWidth;
            canvas.width = 640;
            canvas.height = video.videoHeight * scaleFactor;
            context.translate(canvas.width, 0);
            context.scale(-1, 1);
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            imgBase64 = canvas.toDataURL('image/jpeg', 0.8);
            photoPreview.src = imgBase64;
            photoPreview.classList.remove('hidden');
            video.classList.add('hidden');
            cameraStatus.innerText = "FOTO TEREKAM";
            cameraStatus.classList.replace('bg-black/50', 'bg-emerald-500/80');
            captureBtn.classList.add('hidden');
            retakeBtn.classList.remove('hidden');
        });

        retakeBtn.addEventListener('click', () => {
            imgBase64 = "";
            photoPreview.classList.add('hidden');
            video.classList.remove('hidden');
            cameraStatus.innerText = "HADAP KAMERA";
            cameraStatus.classList.replace('bg-emerald-500/80', 'bg-black/50');
            captureBtn.classList.remove('hidden');
            retakeBtn.classList.add('hidden');
        });

        const style = document.createElement('style');
        style.innerHTML = `@keyframes shimmer { 100% { transform: translateX(100%); } }`;
        document.head.appendChild(style);

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (!imgBase64) { alert("Wajah Anda belum terverifikasi. Silakan ambil foto selfie!"); return; }

            const nama = document.getElementById('empName').value;
            const tipe = document.querySelector('input[name="attendanceType"]:checked').value;
            const originalBtnContent = submitBtn.innerHTML;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <span class="relative z-10 flex items-center justify-center gap-2">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    Sistem Mengirim...
                </span>`;

            const webAppUrl = "https://script.google.com/macros/s/AKfycbxF-Z1em4hmyre3crOe_jQ6M5hdCPn3UEeZ06iM_t5BUYJC91h6L6OVYrPbr0B_KdAGuQ/exec";

            fetch(webAppUrl, {
                method: "POST",
                mode: "no-cors", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nama: nama, tipe: tipe, foto: imgBase64 })
            })
            .then(() => {
                alert(`Presensi ${tipe} atas nama ${nama} Berhasil! \nSelamat Beraktivitas.`);
                form.reset();
                retakeBtn.click();
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnContent;
            })
            .catch(error => {
                alert("Pengiriman gagal, silakan cek koneksi internet Anda.");
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnContent;
            });
        });
    </script>
</body>
</html>
